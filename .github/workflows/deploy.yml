name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('_quartz/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: _quartz/.quartz-cache
          key: ${{ runner.os }}-quartz-${{ hashFiles('_quartz/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-

      - name: Install deps
        working-directory: _quartz
        run: npm ci

      - name: Install Quartz plugins
        working-directory: _quartz
        run: npx quartz plugin install --from-config

      - name: Build site
        working-directory: _quartz
        run: npx quartz build -d ..

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
